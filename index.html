<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>年度进度条</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0"
        rel="stylesheet" />
    <link rel="stylesheet" href="style.css">
    <script type="importmap">
        {
            "imports": {
                "@material/web/": "https://esm.run/@material/web/"
            }
        }
    </script>
    <script type="module">
        import '@material/web/all.js';
    </script>
    <script>
        (function () {
            const storedTheme = localStorage.getItem('theme');
            const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            if (storedTheme === 'dark' || (!storedTheme && systemPrefersDark)) {
                document.documentElement.setAttribute('data-theme', 'dark');
            } else {
                document.documentElement.setAttribute('data-theme', 'light');
            }
        })();
    </script>
</head>

<body>
    <div id="loadingOverlay">
        <md-circular-progress indeterminate></md-circular-progress>
    </div>
    <div class="dashboard">
        <div class="header">
            <h1 class="title"><span id="currentYear"></span> 年已经过去了...</h1>
            <md-icon-button id="themeToggle" aria-label="切换主题" title="切换主题">
                <md-icon id="themeIcon">dark_mode</md-icon>
            </md-icon-button>
        </div>

        <div class="progress-wrapper">
            <md-linear-progress id="progressFill" class="progress-track" value="0"></md-linear-progress>
            <div class="markers">
                <span>0%</span>
                <span>25%</span>
                <span>50%</span>
                <span>75%</span>
                <span>100%</span>
            </div>
        </div>

        <div class="stats-panel">
            <div class="percentage-display">
                <p id="percentageText">0.000000%</p>
            </div>
            <div class="details-display">
                <p id="daysText">计算中...</p>
            </div>
        </div>

        <div class="secondary-dashboards">
            <div class="mini-dashboard">
                <div class="mini-header">
                    <h2 class="mini-title">本月</h2>
                    <span class="mini-percentage" id="monthPercentageText">0%</span>
                </div>
                <md-linear-progress id="monthProgressFill" class="mini-progress-track" value="0"></md-linear-progress>
                <p class="mini-details" id="monthDaysText">计算中...</p>
            </div>

            <div class="mini-dashboard">
                <div class="mini-header">
                    <h2 class="mini-title">本周</h2>
                    <span class="mini-percentage" id="weekPercentageText">0%</span>
                </div>
                <md-linear-progress id="weekProgressFill" class="mini-progress-track" value="0"></md-linear-progress>
                <p class="mini-details" id="weekDaysText">计算中...</p>
            </div>

            <div class="mini-dashboard">
                <div class="mini-header">
                    <h2 class="mini-title">今日</h2>
                    <span class="mini-percentage" id="dayPercentageText">0%</span>
                </div>
                <md-linear-progress id="dayProgressFill" class="mini-progress-track" value="0"></md-linear-progress>
                <p class="mini-details" id="dayHoursText">计算中...</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
