<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>年度进度条</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0"
        rel="stylesheet" />
    <link rel="stylesheet" href="style.css">
    <script>
        (function () {
            const storedTheme = localStorage.getItem('theme');
            const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            if (storedTheme === 'dark' || (!storedTheme && systemPrefersDark)) {
                document.documentElement.setAttribute('data-theme', 'dark');
            } else {
                document.documentElement.setAttribute('data-theme', 'light');
            }
        })();
    </script>
</head>

<body>
    <div class="dashboard">
        <div class="header">
            <h1 class="title"><span id="currentYear"></span> 年已经过去了...</h1>
            <button id="themeToggle" class="icon-button" aria-label="切换主题" title="切换主题">
                <span class="material-symbols-outlined" id="themeIcon">dark_mode</span>
            </button>
        </div>

        <div class="progress-wrapper">
            <div class="progress-track">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="markers">
                <span>0%</span>
                <span>25%</span>
                <span>50%</span>
                <span>75%</span>
                <span>100%</span>
            </div>
        </div>

        <div class="stats-panel">
            <div class="percentage-display">
                <p id="percentageText">0.000000%</p>
            </div>
            <div class="details-display">
                <p id="daysText">计算中...</p>
            </div>
        </div>

        <div class="secondary-dashboards">
            <div class="mini-dashboard">
                <div class="mini-header">
                    <h2 class="mini-title">本月</h2>
                    <span class="mini-percentage" id="monthPercentageText">0%</span>
                </div>
                <div class="mini-progress-track">
                    <div class="mini-progress-fill" id="monthProgressFill"></div>
                </div>
                <p class="mini-details" id="monthDaysText">计算中...</p>
            </div>
            
            <div class="mini-dashboard">
                <div class="mini-header">
                    <h2 class="mini-title">本周</h2>
                    <span class="mini-percentage" id="weekPercentageText">0%</span>
                </div>
                <div class="mini-progress-track">
                    <div class="mini-progress-fill" id="weekProgressFill"></div>
                </div>
                <p class="mini-details" id="weekDaysText">计算中...</p>
            </div>

            <div class="mini-dashboard">
                <div class="mini-header">
                    <h2 class="mini-title">今日</h2>
                    <span class="mini-percentage" id="dayPercentageText">0%</span>
                </div>
                <div class="mini-progress-track">
                    <div class="mini-progress-fill" id="dayProgressFill"></div>
                </div>
                <p class="mini-details" id="dayHoursText">计算中...</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
